name: agent-api CI

on:
  push:
    branches:
      - master
    paths:
      - 'projects/agent-api/**'
      - '.github/workflows/agent-api-ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'projects/agent-api/**'
      - '.github/workflows/agent-api-ci.yml'

concurrency:
  group: agent-api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck / Lint / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: 'projects/agent-api'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/agent-api/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
